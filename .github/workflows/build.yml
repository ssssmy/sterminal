name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Renderer typecheck (vue-tsc)
        run: cd packages/client && npm run typecheck

      - name: Main process typecheck
        run: cd packages/client && npm run typecheck:main

  test-server:
    name: Server Unit & API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Run server tests (auth/sync/api)
        run: cd packages/server && npm test

  test-client:
    name: Client Unit Tests (renderer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Run renderer unit tests (skip main integration — no Electron rebuild in CI)
        run: cd packages/client && npm run test:unit

  build-mac:
    name: Build macOS (${{ matrix.arch }})
    needs: [typecheck, test-server, test-client]
    if: github.event_name == 'push'
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ matrix.arch }}-${{ hashFiles('packages/client/package.json') }}
          restore-keys: electron-mac-${{ matrix.arch }}-

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Package
        run: npm run typecheck:all && npx vite build && npx electron-builder --mac --${{ matrix.arch }} --publish never
        working-directory: packages/client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sterminal-macos-${{ matrix.arch }}
          path: packages/client/release/*.dmg
          retention-days: 7

  build-windows:
    name: Build Windows
    needs: [typecheck, test-server, test-client]
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-win-${{ hashFiles('packages/client/package.json') }}
          restore-keys: electron-win-

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Package (NSIS + Portable)
        run: npm run typecheck:all && npx vite build && npx electron-builder --win --publish never
        working-directory: packages/client

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: sterminal-windows-setup
          path: packages/client/release/*Setup*.exe
          retention-days: 7

      - name: Upload Portable (zip)
        uses: actions/upload-artifact@v4
        with:
          name: sterminal-windows-portable
          path: packages/client/release/*.zip
          retention-days: 7

  build-linux:
    name: Build Linux
    needs: [typecheck, test-server, test-client]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-linux-${{ hashFiles('packages/client/package.json') }}
          restore-keys: electron-linux-

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Package
        run: npm run typecheck:all && npx vite build && npx electron-builder --linux --publish never
        working-directory: packages/client

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sterminal-linux
          path: |
            packages/client/release/*.AppImage
            packages/client/release/*.deb
          retention-days: 7
