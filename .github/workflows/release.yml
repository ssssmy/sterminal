name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    name: Release macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Publish
        run: npm run typecheck:all && npx vite build && npx electron-builder --mac --${{ matrix.arch }} --publish always
        working-directory: packages/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  release-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Publish
        run: npm run typecheck:all && npx vite build && npx electron-builder --win --publish always
        working-directory: packages/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Publish
        run: npm run typecheck:all && npx vite build && npx electron-builder --linux --publish always
        working-directory: packages/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-docker:
    name: Release Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 自动按 tag 生成镜像 tag：v0.1.1 -> {0.1.1, 0.1, latest}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sterminal-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          # 仅 amd64：阿里云 / 大多数云主机用得上；后续要 arm64 再加 linux/arm64
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 缓存，加快后续同源 layer 的构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
