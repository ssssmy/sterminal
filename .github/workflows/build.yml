name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Vue typecheck
        run: cd packages/client && npm run typecheck

  build-mac:
    name: Build macOS (${{ matrix.arch }})
    needs: typecheck
    if: github.event_name == 'push'
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ matrix.arch }}-${{ hashFiles('packages/client/package.json') }}
          restore-keys: electron-mac-${{ matrix.arch }}-

      - run: npm install

      - name: Build & Package
        run: npx vue-tsc --noEmit && npx vite build && npx electron-builder --mac --${{ matrix.arch }}
        working-directory: packages/client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sterminal-macos-${{ matrix.arch }}
          path: packages/client/release/*.dmg
          retention-days: 7

  build-windows:
    name: Build Windows
    needs: typecheck
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-win-${{ hashFiles('packages/client/package.json') }}
          restore-keys: electron-win-

      - run: npm install

      - name: Build & Package
        run: npm run client:pack:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sterminal-windows
          path: packages/client/release/*.exe
          retention-days: 7

  build-linux:
    name: Build Linux
    needs: typecheck
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-linux-${{ hashFiles('packages/client/package.json') }}
          restore-keys: electron-linux-

      - run: npm install

      - name: Build & Package
        run: npm run client:pack:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sterminal-linux
          path: |
            packages/client/release/*.AppImage
            packages/client/release/*.deb
          retention-days: 7
