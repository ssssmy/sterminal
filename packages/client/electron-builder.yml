electronVersion: "33.4.11"
appId: app.sterminal.client
productName: STerminal
copyright: Copyright © 2026 STerminal

# 构建目录配置
directories:
  output: release
  buildResources: resources

# 打包文件
files:
  - dist/**/*
  - dist-electron/main/**/*
  - dist-electron/preload/**/*
  - bin/**/*
  - resources/icons/**/*
  - resources/icon.png
  - package.json
  # external 模块需要随应用打包（monorepo hoist 到根 node_modules）
  - from: ../../node_modules/libsodium
    to: node_modules/libsodium
    filter: ["**/*"]
  - from: ../../node_modules/libsodium-sumo
    to: node_modules/libsodium-sumo
    filter: ["**/*"]
  - from: ../../node_modules/libsodium-wrappers-sumo
    to: node_modules/libsodium-wrappers-sumo
    filter: ["**/*"]
  - from: ../../node_modules/ws
    to: node_modules/ws
    filter: ["**/*"]

# asar 打包（原生模块需要 unpack）
asar: true
asarUnpack:
  - "node_modules/node-pty/**"
  - "node_modules/better-sqlite3/**"
  - "node_modules/ssh2/**"
  - "resources/**"

# ===== URI Scheme 协议注册 =====
protocols:
  - name: STerminal
    schemes:
      - sterminal

# ===== macOS 配置 =====
mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ===== Windows 配置 =====
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: STerminal

# ===== Linux 配置 =====
linux:
  icon: resources/icons
  category: Development
  maintainer: STerminal Team
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

deb:
  packageName: sterminal
  artifactName: ${productName}_${version}_${arch}.${ext}
  depends:
    - libnotify4
    - libxtst6
    - libnss3

# 发布配置 — GitHub Releases（electron-updater 从此处下载更新）
publish:
  provider: github
  owner: ssssmy
  repo: sterminal
