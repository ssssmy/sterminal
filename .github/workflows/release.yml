name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    name: Release macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Publish
        run: npm run typecheck:all && npx vite build && npx electron-builder --mac --${{ matrix.arch }} --publish always
        working-directory: packages/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  release-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Publish
        run: npm run typecheck:all && npx vite build && npx electron-builder --win --publish always
        working-directory: packages/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm install

      - name: Rebuild native modules for Electron
        run: cd packages/client && npm run rebuild:electron

      - name: Build & Publish
        run: npm run typecheck:all && npx vite build && npx electron-builder --linux --publish always
        working-directory: packages/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
