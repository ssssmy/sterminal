# STerminal 后端 — 生产部署（直接拉 GHCR 镜像，不在本机构建）
#
# 与 docker-compose.yml 的区别：
#   docker-compose.yml      build: 本地 Dockerfile → 用于开发 / 调试
#   docker-compose.prod.yml image: ghcr.io/...     → 用于生产部署
#
# 使用方式（在 packages/server 目录下）：
#   1. 复制环境变量模板：cp .env.example .env，按需修改 JWT_SECRET 等
#   2. （可选）锁定镜像版本：在 .env 里加 IMAGE_TAG=0.1.2，否则默认 latest
#   3. 拉最新镜像 + 启动：    docker compose -f docker-compose.prod.yml pull \
#                            && docker compose -f docker-compose.prod.yml up -d
#   4. 查看日志：             docker compose -f docker-compose.prod.yml logs -f
#   5. 停止 / 升级：          docker compose -f docker-compose.prod.yml down
#                             docker compose -f docker-compose.prod.yml pull
#                             docker compose -f docker-compose.prod.yml up -d
#
# 已经在 packages/server/package.json 提供便捷脚本：
#   npm run docker:prod:pull   # 拉最新镜像
#   npm run docker:prod:up     # 启动（默认 detached）
#   npm run docker:prod:down   # 停止 + 销毁容器
#   npm run docker:prod:logs   # 实时日志
#   npm run docker:prod:upgrade # pull + up，一键升级

services:
  sterminal-server:
    image: ghcr.io/ssssmy/sterminal-server:${IMAGE_TAG:-latest}
    container_name: sterminal-server
    restart: unless-stopped

    ports:
      - "${PORT:-3001}:3001"

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      DB_PATH: /app/packages/server/data/sterminal.db
      UPLOAD_DIR: /app/packages/server/uploads

    # 把 JWT_SECRET / SMTP / OAuth 等敏感配置放到 .env 中
    env_file:
      - .env

    volumes:
      - ./data:/app/packages/server/data
      - ./uploads:/app/packages/server/uploads

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:'+(process.env.PORT||3001)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 512M
