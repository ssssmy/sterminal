electronVersion: "33.4.11"
appId: app.sterminal.client
productName: STerminal
copyright: Copyright © 2026 STerminal
homepage: https://github.com/ssssmy/sterminal

# 构建目录配置
directories:
  output: release
  buildResources: resources

# 打包文件
files:
  - dist/**/*
  - dist-electron/main/**/*
  - dist-electron/preload/**/*
  - package.json

# asar 打包（原生模块需要 unpack）
asar: true
asarUnpack:
  - "node_modules/node-pty/**"
  - "node_modules/better-sqlite3/**"
  - "node_modules/ssh2/**"

# ===== macOS 配置 =====
mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ===== Windows 配置 =====
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: STerminal

# ===== Linux 配置 =====
linux:
  icon: resources/icons
  category: Development
  maintainer: STerminal Team
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3

# 发布配置（暂不自动发布）
publish: null
